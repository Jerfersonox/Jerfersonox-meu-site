<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mundo Inclusivo</title>

<style>
body{
 margin:0;
 font-family:Arial;
 text-align:center;
 background:linear-gradient(135deg,#667eea,#764ba2);
 color:white;
 transition:0.5s;
}

.container{
 padding:20px;
 max-width:500px;
 margin:auto;
}

button{
 width:90%;
 padding:15px;
 margin:10px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 font-weight:bold;
 cursor:pointer;
}

input{
 width:90%;
 padding:15px;
 margin:8px 0;
 border-radius:12px;
 border:none;
}

.hidden{display:none;}

/* MODO CALMO */
.calmo{
 background:#a8dadc !important;
 color:#000;
}

/* JOGO */
#game{
 display:grid;
 gap:10px;
}

#game button{
 height:70px;
 font-size:22px;
}

/* VITÓRIA */
#win{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 font-size:26px;
}
</style>
</head>

<body>

<audio id="somEntrada" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce58.mp3"></audio>
<audio id="somWin" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c5c8c0b6c2.mp3"></audio>

<!-- LOGIN -->
<div id="login" class="container">
<h2>🔐 Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="cadastro()">Cadastrar</button>
<p id="msg"></p>
</div>

<!-- MENU -->
<div id="menu" class="container hidden">
<h2>🧠 Mundo Inclusivo</h2>

<button onclick="abrirJogo(4)">🟢 Fácil</button>
<button onclick="abrirJogo(6)">🟡 Médio</button>
<button onclick="abrirJogo(8)">🔴 Difícil</button>

<button onclick="modoCalmo()">🌿 Modo Calmo</button>

<button onclick="logout()">Sair</button>
</div>

<!-- JOGO -->
<div id="memoria" class="container hidden">
<h2>🧩 Memória</h2>
<p>Pontos: <span id="score">0</span></p>
<div id="game"></div>
<button onclick="voltar()">⬅ Voltar</button>
</div>

<!-- VITÓRIA -->
<div id="win" class="hidden">
🎉 Parabéns!<br><br>
<button onclick="fecharWin()">Continuar</button>
</div>

<script>

// SOM AO ENTRAR
window.onload = () => {
 document.getElementById("somEntrada").play();
 document.getElementById("win").classList.add("hidden");
}

// LOGIN
function cadastro(){
 let u=user.value;
 let p=pass.value;
 if(u && p){
  localStorage.setItem("user_"+u,p);
  msg.innerText="Cadastrado!";
 }
}

function login(){
 let u=user.value;
 let p=pass.value;

 if(localStorage.getItem("user_"+u)===p){
  login.classList.add("hidden");
  menu.classList.remove("hidden");
 }else{
  msg.innerText="Erro";
 }
}

function logout(){
 location.reload();
}

// NAVEGAÇÃO
function voltar(){
 memoria.classList.add("hidden");
 menu.classList.remove("hidden");
}

// MODO CALMO (AUTISMO)
function modoCalmo(){
 document.body.classList.toggle("calmo");
}

// JOGO
function abrirJogo(n){
 menu.classList.add("hidden");
 memoria.classList.remove("hidden");

 game.style.gridTemplateColumns = "repeat(4,1fr)";

 let emojis = ["🐶","🐱","🍎","🍌","🍇","🍉","🚗","⚽"];
 let usados = emojis.slice(0,n);
 let cards = [...usados,...usados].sort(()=>0.5-Math.random());

 game.innerHTML="";
 score.innerText=0;

 let first=null, second=null, lock=false, pontos=0;

 cards.forEach(e=>{
  let b=document.createElement("button");
  b.innerText="?";

  b.onclick=()=>{
   if(lock||b.innerText!=="?") return;

   b.innerText=e;

   if(!first){
    first=b;
   }else{
    second=b;
    lock=true;

    if(first.innerText===second.innerText){
     pontos+=10;
     score.innerText=pontos;
     first=null; second=null; lock=false;

     if(pontos===n*10){
      document.getElementById("somWin").play();
      document.getElementById("win").classList.remove("hidden");
     }

    }else{
     setTimeout(()=>{
      first.innerText="?";
      second.innerText="?";
      first=null; second=null; lock=false;
     },800);
    }
   }
  };

  game.appendChild(b);
 });
}

// FECHAR
function fecharWin(){
 document.getElementById("win").classList.add("hidden");
 voltar();
}

</script>

</body>
</html>
